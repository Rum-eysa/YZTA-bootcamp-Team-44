name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        working-directory: ./apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Black
        working-directory: ./apps/api
        run: black --check app/
        
      - name: Run isort
        working-directory: ./apps/api
        run: isort --check-only app/
        
      - name: Run flake8
        working-directory: ./apps/api
        run: flake8 app/ --max-line-length=100 --extend-ignore=E203,W503
        
      - name: Run mypy
        working-directory: ./apps/api
        run: mypy app/ --ignore-missing-imports

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./apps/web
        run: npm install

      - name: Run ESLint
        working-directory: ./apps/web
        run: npm run lint

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: yzta_user
          POSTGRES_PASSWORD: yzta_password
          POSTGRES_DB: yzta_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        working-directory: ./apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        working-directory: ./apps/api
        env:
          DATABASE_URL: postgresql://yzta_user:yzta_password@localhost:5432/yzta_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-min-32-characters
          GEMINI_API_KEY: test-key
          ENVIRONMENT: test
          DEBUG: false
        run: pytest tests/ -v --cov=app --cov-report=xml
        
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./apps/api/coverage.xml
          flags: api
