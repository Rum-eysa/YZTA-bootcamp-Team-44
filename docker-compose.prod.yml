# PRODUCTION - optimized

services:
  postgres:
    image: postgres:15-alpine
    container_name: yzta_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER:-yzta_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-yzta_bootcamp}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yzta_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yzta_network_prod
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: yzta_redis_prod
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yzta_network_prod
    restart: on-failure
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: yzta_api_prod
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-yzta_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-yzta_bootcamp}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: production
      DEBUG: false
      LOG_LEVEL: info
      COMPILER_URL: http://compiler:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      compiler:
        condition: service_healthy
    networks:
      - yzta_network_prod
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  compiler:
    build:
      context: ./apps/compiler
      dockerfile: Dockerfile
    container_name: yzta_compiler_prod
    environment:
      TECTONIC_CACHE_DIR: /cache
      COMPILE_TIMEOUT_SECONDS: 120
    volumes:
      - compiler_cache_prod:/cache
    networks:
      - yzta_network_prod
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: yzta_web_prod
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_INTERNAL_URL: http://api:8000
    depends_on:
      - api
    networks:
      - yzta_network_prod
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  yzta_network_prod:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:
  compiler_cache_prod:
